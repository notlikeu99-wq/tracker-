<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAWD'S LAW Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA9nzd0v4BbGVliVRJHxXFYqqgu8_dCca4",
  authDomain: "gawds-law.firebaseapp.com",
  databaseURL: "https://gawds-law-default-rtdb.firebaseio.com",
  projectId: "gawds-law",
  storageBucket: "gawds-law.firebasestorage.app",
  messagingSenderId: "730892261260",
  appId: "1:730892261260:web:9375f8ea5978e92f8c68a9",
  measurementId: "G-K8LFD3ZS4Q"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, "gawdsLawPremium");

let data = {records:{},success:0,fail:0,free:0};

let start = new Date(new Date().getFullYear(),3,1);
let end = new Date(new Date().getFullYear()+1,1,1);

onValue(dbRef,(snap)=>{
  if(snap.exists()) data=snap.val();
  render();
});

function save(){ set(dbRef,data); }

window.mark=function(day,type){
  if(data.records?.[day]) return alert("Already marked!");
  if(type==="free" && (data.free||0)>=3) return alert("No Free Days Left!");

  if(!data.records) data.records={};
  data.records[day]=type;

  if(type==="success") data.success=(data.success||0)+1;
  if(type==="fail") data.fail=(data.fail||0)+1;
  if(type==="free") data.free=(data.free||0)+1;

  save();
};

function calculateStreak(){
  if(!data.records) return 0;
  let sorted=Object.keys(data.records).sort().reverse();
  let streak=0;
  for(let d of sorted){
    if(data.records[d]==="success") streak++;
    else break;
  }
  return streak;
}

let doughnutChart,lineChart;

function render(){

  document.getElementById("success").innerText=data.success||0;
  document.getElementById("fail").innerText=data.fail||0;
  document.getElementById("free").innerText=data.free||0;
  document.getElementById("streak").innerText=calculateStreak();

  let totalDays=(end-start)/(1000*60*60*24);
  let percent=((data.success||0)/totalDays)*100;
  document.getElementById("bar").style.width=percent+"%";

  updateCharts();
  generateDays();
}

function updateCharts(){

  if(doughnutChart) doughnutChart.destroy();
  if(lineChart) lineChart.destroy();

  const ctx1=document.getElementById("doughnut").getContext("2d");
  doughnutChart=new Chart(ctx1,{
    type:"doughnut",
    data:{
      labels:["Success","Fail","Free"],
      datasets:[{
        data:[data.success||0,data.fail||0,data.free||0],
        backgroundColor:["#00e676","#ff5252","#ffd740"],
        borderWidth:0
      }]
    },
    options:{plugins:{legend:{labels:{color:"white"}}}}
  });

  const ctx2=document.getElementById("line").getContext("2d");
  let cumulative=0;
  let labels=[];
  let values=[];
  Object.keys(data.records||{}).sort().forEach(d=>{
    if(data.records[d]==="success") cumulative++;
    labels.push(d.slice(5));
    values.push(cumulative);
  });

  lineChart=new Chart(ctx2,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Total Success Growth",
        data:values,
        borderColor:"#6ae3ff",
        backgroundColor:"rgba(106,227,255,0.1)",
        fill:true,
        tension:0.3
      }]
    },
    options:{
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      },
      plugins:{legend:{labels:{color:"white"}}}
    }
  });
}

function generateDays(){
  let container=document.getElementById("days");
  container.innerHTML="";
  let d=new Date(start);

  while(d<=end){
    let key=d.toISOString().split("T")[0];

    let div=document.createElement("div");
    div.className="day";
    div.innerHTML=`
      <span>${key}</span>
      <div>
        <button class="s" onclick="mark('${key}','success')">✔</button>
        <button class="f" onclick="mark('${key}','fail')">✘</button>
        <button class="fr" onclick="mark('${key}','free')">★</button>
      </div>
    `;
    container.appendChild(div);
    d.setDate(d.getDate()+1);
  }
}

</script>

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#0b0f17;
  color:white;
}
.app{
  max-width:420px;
  margin:auto;
  padding:15px;
}
.card{
  background:#121826;
  border-radius:18px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  text-align:center;
}
.stats h2{margin:0;}
.progress{
  background:#1c2333;
  height:8px;
  border-radius:10px;
  margin-top:10px;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#6ae3ff,#9b8cff);
  width:0%;
  border-radius:10px;
}
.day{
  display:flex;
  justify-content:space-between;
  padding:8px;
  background:#161d2e;
  margin-bottom:6px;
  border-radius:10px;
  font-size:13px;
}
button{
  border:none;
  padding:5px 8px;
  border-radius:6px;
  margin-left:4px;
  font-weight:bold;
  cursor:pointer;
}
.s{background:#00e676}
.f{background:#ff5252;color:white}
.fr{background:#ffd740}
canvas{margin-top:15px;}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h2>GAWD'S LAW Dashboard</h2>

<div class="stats">
<div><h2 id="success">0</h2><small>Success</small></div>
<div><h2 id="fail">0</h2><small>Fail</small></div>
<div><h2 id="free">0</h2><small>Free</small></div>
<div><h2 id="streak">0</h2><small>Streak</small></div>
</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<canvas id="doughnut"></canvas>
<canvas id="line"></canvas>

</div>

<div class="card">
<h3>Day Wise Tracking</h3>
<div id="days"></div>
</div>

</div>
</body>
</html>
